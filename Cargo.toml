[package]
name = "rcon2mc"
version = "0.0.1-dev.2"
edition = "2024"
description = "A Rcon Client for Minecraft Server with lib  and cli tool, also with a rcon2http server"
license = "MIT"
repository = "https://github.com/NearlyHeadlessJack/rcon2mc"
authors = ["NearlyHeadlessJack <wang@rjack.cn>"]
keywords = ["rcon", "minecraft", "http", "cli"]
readme = "README.md"
exclude = ["target/", "examples/", "tests/",".github/"]



[dependencies]
hex = "0.4.3"
base64 = "0.22.1"
tokio = { version = "1.49.0", features = ["full"] }
[lib]
name = "rcon2mc"
path = "src/lib.rs"

[[bin]]
name = "rcon2mc-cli"
path = "src/bin/main.rs"