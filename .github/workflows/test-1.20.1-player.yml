name: test-1.20.1.yml
on:
  workflow_call:

env:
  GITHUB_ACTIONS: true
  RCON_TEST_MC_VERSION: "1.20.1"
  RUST_BACKTRACE: "1"
jobs:
  testing-1-20-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker
        run: |
          docker pull ghcr.io/nearlyheadlessjack/mc-test:1.20.1.0
          docker run -d --name mc-test --network host ghcr.io/nearlyheadlessjack/mc-test:1.20.1.0
          sleep 15s
      - name: Download Minecraft-cli-Client
        run: |
          docker pull ghcr.io/nearlyheadlessjack/mc-cli-client:1.0.8
          docker run -d --name mc-cli-1 -e PLAYER_ID=player1 --network host ghcr.io/nearlyheadlessjack/mc-cli-client:1.0.8
          sleep 2s
          docker logs mc-cli-1
          docker run -d --name mc-cli-2 -e PLAYER_ID=player2 --network host ghcr.io/nearlyheadlessjack/mc-cli-client:1.0.8
          sleep 2s
          docker logs mc-cli-2
          docker run -d --name mc-cli-3 -e PLAYER_ID=player3 --network host ghcr.io/nearlyheadlessjack/mc-cli-client:1.0.8
          sleep 2s
          docker logs mc-cli-3
          docker run -d --name mc-cli-4 -e PLAYER_ID=player4 --network host ghcr.io/nearlyheadlessjack/mc-cli-client:1.0.8
          docker logs mc-cli-4
      - name: Run Tests
        run: |
          cargo test --test test_docker_rcon_connection  -- --test-threads=1
          cargo test --test test_docker_command_with_player -- --test-threads=1 --nocapture
