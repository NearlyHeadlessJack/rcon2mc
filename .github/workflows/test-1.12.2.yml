name: test-1.12.2.yml
on:
  workflow_call:

env:
  GITHUB_ACTIONS: true
  RCON_TEST_MC_VERSION: "1.12.2"
  RUST_BACKTRACE: "1"

jobs:
  testing-1-12-2:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker
        run: |
          docker pull ghcr.io/nearlyheadlessjack/mc-test:1.12.2.3
          docker run -d --name mc-test --network host ghcr.io/nearlyheadlessjack/mc-test:1.12.2.3
          sleep 10s

      - name: Setup nextest
        run: |
          cargo install cargo-nextest

      - name: Run Tests
        env:
          NEXTEST_PROFILE: ci
        run: |
          cargo nextest run -- test_docker_rcon_connection
          cargo nextest run -- test_docker_command

          
