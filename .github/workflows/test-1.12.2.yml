name: test-1.12.2.yml
on:
  workflow_call:

env:
  GITHUB_ACTIONS: true
  RCON_TEST_MC_VERSION: "1.12.2"
  RUST_BACKTRACE: "1"

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker
        run: |
          docker pull ghcr.io/nearlyheadlessjack/mc-test:1.12.2.0
          docker run -d --name mc-test --network host ghcr.io/nearlyheadlessjack/mc-test:1.12.2.0
          sleep 8

      - name: Run Tests
        run: |
          cargo test --test test_docker_rcon_connection --test-threads=1