name: test-1.16.5.yml
on:
  workflow_call:

env:
  GITHUB_ACTIONS: true
  RCON_TEST_MC_VERSION: "1.16.5"
  RUST_BACKTRACE: "1"

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker
        run: |
          docker pull ghcr.io/nearlyheadlessjack/mc-test:1.16.5.1
          docker run -d --name mc-test --network host ghcr.io/nearlyheadlessjack/mc-test:1.16.5.1
          sleep 8

      - name: Run Tests
        run: |
          cargo test -- --test-threads=1