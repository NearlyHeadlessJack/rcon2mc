name: test-1.16.5.yml
on:
  workflow_call:

env:
  GITHUB_ACTIONS: true

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker
        run: |
          docker pull ghcr.io/nearlyheadlessjack/mc-test:1.16.5.1
          docker run -d --name mc-test -p 25575:25575 ghcr.io/nearlyheadlessjack/mc-test:1.16.5.1

      - name: Run Tests
        run: |
          cargo test -- --test-threads=1 --verbose