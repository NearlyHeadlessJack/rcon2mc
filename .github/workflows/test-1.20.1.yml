name: test-1.20.1.yml
on:
  workflow_call:

env:
  GITHUB_ACTIONS: true
  RCON_TEST_MC_VERSION: "1.20.1"
  RUST_BACKTRACE: "1"
jobs:
  testing-1-20-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker
        run: |
          docker pull ghcr.io/nearlyheadlessjack/mc-test:1.20.1.0
          docker run -d --name mc-test --network host ghcr.io/nearlyheadlessjack/mc-test:1.20.1.0
          sleep 6s

      - name: Setup nextest
        uses: taiki-e/install-action@nextest

      - name: Run Tests
        env:
          NEXTEST_PROFILE: ci
        run: |
          cargo nextest run -- test_docker_rcon_connection 
          cargo nextest run -- test_docker_command
